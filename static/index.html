<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train Depot</title>
  <link rel="stylesheet" href="/css/styles.css?v=32">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚂</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1b4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script>
    // Apply saved theme immediately to prevent flash
    (function() {
      const saved = localStorage.getItem('trainCatalogTheme');
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo" onclick="app.showLanding()">
        <span class="logo-icon">🚂</span>
        <span>Train Depot</span>
      </div>
      <ul class="nav-links" id="navLinks">
        <li><a href="#" onclick="app.showLanding(); return false;" id="nav-home" class="active">Home</a></li>
        <li><a href="#" onclick="app.showCatalog(); return false;" id="nav-catalog">Catalog</a></li>
        <li><a href="#" onclick="app.showDashboard(); return false;" id="nav-dashboard">Dashboard</a></li>
        <li><a href="#" onclick="app.showBackup(); return false;" id="nav-backup">Settings</a></li>
      </ul>
      <div class="header-right">
        <div class="nav-search">
          <input type="text" id="globalSearch" placeholder="Search collection..." oninput="app.handleSearchLive(event)" onkeyup="app.handleSearch(event)">
        </div>
        <button class="theme-toggle" onclick="app.toggleTheme()" title="Toggle dark mode">
          <span class="theme-icon" id="themeIcon">🌙</span>
        </button>
        <button class="theme-toggle" onclick="app.logout()" title="Sign out" id="logoutBtn" style="display:none;">
          <span>🔒</span>
        </button>
      </div>
      <button class="menu-toggle" onclick="app.toggleMobileMenu()" aria-label="Open menu">☰</button>
    </div>
  </header>

  <!-- Mobile drawer (shown only on small screens) -->
  <div class="mobile-drawer-backdrop" id="mobileDrawerBackdrop" onclick="app.closeMobileMenu()"></div>
  <aside class="mobile-drawer" id="mobileDrawer" aria-hidden="true">
    <div class="mobile-drawer-header">
      <span class="mobile-drawer-title">Menu</span>
      <button class="mobile-drawer-close" onclick="app.closeMobileMenu()" aria-label="Close menu">&times;</button>
    </div>
    <div class="mobile-drawer-search">
      <input type="text" id="mobileSearch" placeholder="Search collection..." oninput="app.handleSearchLive(event)" onkeyup="app.handleMobileSearch(event)">
    </div>
    <nav class="mobile-drawer-nav">
      <a href="#" onclick="app.showLanding(); app.closeMobileMenu(); return false;">🏠 Home</a>
      <a href="#" onclick="app.showCatalog(); app.closeMobileMenu(); return false;">📚 Catalog</a>
      <a href="#" onclick="app.showDashboard(); app.closeMobileMenu(); return false;">📊 Dashboard</a>
      <a href="#" onclick="app.showBackup(); app.closeMobileMenu(); return false;">⚙️ Settings</a>
    </nav>
    <div class="mobile-drawer-actions">
      <button class="mobile-drawer-action" onclick="app.toggleTheme()">
        <span class="theme-icon" id="mobileThemeIcon">🌙</span>
        <span>Toggle theme</span>
      </button>
      <button class="mobile-drawer-action" onclick="app.logout()" id="mobileLogoutBtn" style="display:none;">
        <span>🔒</span>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stats-inner" id="statsContent"></div>
  </div>

  <!-- Main Content Area -->
  <main id="mainContent">
    <!-- Content is dynamically rendered by JavaScript -->
  </main>

  <!-- Modal for Add/Edit Item -->
  <div class="modal-overlay" id="itemModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add New Item</h2>
        <button class="modal-close" onclick="app.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="itemForm" onsubmit="app.saveItem(event)">
          <div class="form-group">
            <label class="form-label">Name <span class="required">*</span></label>
            <input type="text" class="form-input" id="formName" required placeholder="Start typing a model name..." autocomplete="off"
                   oninput="app.suggestModelName()" onblur="setTimeout(()=>app.hideModelSuggestions(),200)">
            <ul class="autosuggest-list" id="suggest-modelName" style="display:none"></ul>
            <div id="refImageNotice" style="display:none; margin-top:8px; padding:8px 12px; background:var(--gold-glow); border-radius:var(--radius-sm); font-size:0.85rem; color:var(--color-text);">
              <span style="margin-right:4px;">✨</span> <span id="refImageNoticeText"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Category <span class="required">*</span></label>
              <select class="form-select" id="formCategory" required onchange="app.updateSubcategories()">
                <option value="">Select category...</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Subcategory <span class="required">*</span></label>
              <select class="form-select" id="formSubcategory" required>
                <option value="">Select subcategory...</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Running Number</label>
              <input type="text" class="form-input" id="formRunningNumber" placeholder="e.g., 4472 — every engine needs a number!">
            </div>
            <div class="form-group">
              <label class="form-label">Product Code</label>
              <input type="text" class="form-input" id="formProductCode" placeholder="e.g., R3834 or 32-360" oninput="app.autoDetectManufacturer()" onblur="app.checkDuplicate()">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Condition</label>
              <select class="form-select" id="formCondition">
                <option value="">Select condition...</option>
                <option value="mint-boxed">Mint - Boxed</option>
                <option value="mint">Mint</option>
                <option value="excellent-boxed">Excellent - Boxed</option>
                <option value="excellent">Excellent</option>
                <option value="good">Good</option>
                <option value="fair">Fair</option>
                <option value="poor">Poor</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">DCC Status</label>
              <select class="form-select" id="formDccStatus">
                <option value="">Select DCC status...</option>
                <option value="analogue">Analogue</option>
                <option value="dcc-ready">DCC Ready</option>
                <option value="dcc-fitted">DCC Fitted</option>
                <option value="dcc-sound">DCC Sound</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Manufacturer</label>
              <input type="text" class="form-input" id="formManufacturer" placeholder="Start typing..." autocomplete="off" oninput="app.suggest.show('formManufacturer', 'manufacturers')" onblur="setTimeout(()=>app.suggest.hide('formManufacturer'),200)">
              <ul class="autosuggest-list" id="suggest-formManufacturer" style="display:none"></ul>
            </div>
            <div class="form-group">
              <label class="form-label">Livery</label>
              <input type="text" class="form-input" id="formLivery" placeholder="Start typing..." autocomplete="off" oninput="app.suggest.show('formLivery', 'liveries')" onblur="setTimeout(()=>app.suggest.hide('formLivery'),200)">
              <ul class="autosuggest-list" id="suggest-formLivery" style="display:none"></ul>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Purchase Price (£)</label>
              <input type="number" class="form-input" id="formPrice" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
              <label class="form-label">Current Value (£)</label>
              <input type="number" class="form-input" id="formCurrentValue" step="0.01" min="0" placeholder="0.00">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Place of Purchase</label>
              <input type="text" class="form-input" id="formPlace" placeholder="Start typing..." autocomplete="off" oninput="app.suggest.show('formPlace', 'retailers')" onblur="setTimeout(()=>app.suggest.hide('formPlace'),200)">
              <ul class="autosuggest-list" id="suggest-formPlace" style="display:none"></ul>
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:4px;">
              <label class="wishlist-toggle">
                <input type="checkbox" id="formWishlist" onchange="app.toggleWishlistFields()">
                <span class="wishlist-label">⭐ Wishlist item</span>
              </label>
            </div>
          </div>

          <div id="wishlistFieldsGroup" style="display:none;">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Spotted At</label>
                <input type="text" class="form-input" id="formWishlistSpottedAt" placeholder="Where did you see it?">
              </div>
              <div class="form-group">
                <label class="form-label">Spotted Price (£)</label>
                <input type="number" class="form-input" id="formWishlistSpottedPrice" step="0.01" min="0" placeholder="0.00">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Wishlist Notes</label>
              <input type="text" class="form-input" id="formWishlistNotes" placeholder="Any notes about this item...">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Purchase Date</label>
              <input type="date" class="form-input" id="formPurchaseDate">
            </div>
            <div class="form-group">
              <label class="form-label">Storage Location</label>
              <input type="text" class="form-input" id="formStorageLocation" placeholder="Where is this stored?">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Last Service Date</label>
              <input type="date" class="form-input" id="formServiceDate">
            </div>
            <div class="form-group">
              <label class="form-label">Goes Well With</label>
              <input type="text" class="form-input" id="formGoesWellWith" placeholder="e.g., Teak coaches, LNER parcels van" autocomplete="off">
              <div id="goesWellSuggestions" style="display:none;"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Tags</label>
            <div class="tags-input-wrapper">
              <input type="text" class="form-input tags-input" id="formTags" placeholder="Type a tag and press Enter" onkeypress="app.handleTagInput(event)">
              <div class="tags-container" id="formTagsContainer"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Historical Background</label>
            <textarea class="form-textarea" id="formHistory" rows="3" placeholder="Historical information about the prototype..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Photographs</label>
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()"
                 ondragover="event.preventDefault(); this.classList.add('dragover')"
                 ondragleave="this.classList.remove('dragover')"
                 ondrop="app.handleDrop(event)">
              <span class="upload-icon">🖼️</span>
              <div class="upload-text">Click or drag images here</div>
              <div class="upload-hint">JPG, PNG, GIF, WebP (max 10MB each)</div>
            </div>
            <div class="upload-actions">
              <button type="button" class="btn btn-primary" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
              <button type="button" class="btn btn-outline" onclick="document.getElementById('fileInput').click()">🖼️ Choose from Library</button>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="app.handleFileSelect(event)">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="app.handleFileSelect(event)">
            <div class="upload-previews" id="uploadPreviews"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" type="button" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-primary" type="button" onclick="app.saveItem(event)">💾 Save Item</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Footer -->
  <footer class="site-footer">
    Train Depot &copy; 2026 &middot; Built with care for collectors
  </footer>

  <script src="/js/reference-db.js?v=4"></script>
  <script src="/js/app.js?v=23"></script>
  <script src="/js/modals.js?v=2"></script>
  <script src="/js/auth.js?v=3"></script>
  <script src="/js/catalog.js?v=4"></script>
  <script src="/js/detail.js?v=4"></script>
  <script src="/js/form.js?v=1"></script>
  <script src="/js/valuation.js?v=3"></script>
  <script src="/js/settings.js?v=3"></script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
